<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalcraft Farm Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%230f111a' stroke='%23818cf8' stroke-width='8'/><path d='M50 10A40 40 0 0 1 90 50A40 40 0 0 0 50 10' fill='%23818cf8'/></svg>">
    <style>
        :root {
            --bg-gradient-start: #0f111a;
            --bg-gradient-end: #07080c;
            --panel-bg: rgba(22, 26, 41, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(10, 12, 20, 0.8);
            --input-border: rgba(255, 255, 255, 0.12);
            --input-focus: #4f46e5;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #34d399;
            --accent-orange: #fb923c;
            --accent-purple: #818cf8;
            --card-inner-bg: rgba(255, 255, 255, 0.02);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 32px;
            width: 100%;
            max-width: 1200px;
            align-items: start;
        }

        .main-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .stats-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: sticky;
            top: 40px;
        }

        .header {
            margin-bottom: 32px;
            text-align: left;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .stats-header h2 {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        /* СТИЛИ ДЛЯ ПЛАШКИ ТОКЕНА */
        .token-panel {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .token-header {
            padding: 16px 24px;
            display: flex;
            justify-between: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
        }

        .token-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.75px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .token-arrow {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.2s ease;
        }

        .token-panel.active .token-arrow {
            transform: rotate(180deg);
        }

        .token-body {
            display: none;
            padding: 0 24px 24px 24px;
            animation: fadeIn 0.2s ease;
        }

        .token-panel.active .token-body {
            display: block;
        }

        .input-block {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .inputs-inline {
            display: grid;
            grid-template-columns: 1.2fr 1fr auto;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.75px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: all 0.25s ease;
        }

        input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .sold-toggle-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-trigger-sold {
            background: rgba(251, 146, 60, 0.1);
            border: 1px solid rgba(251, 146, 60, 0.2);
            color: var(--accent-orange);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0.2s;
        }

        .btn-trigger-sold:hover {
            background: var(--accent-orange);
            color: #000;
        }

        .sold-input-wrapper {
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .sold-input-wrapper.active {
            display: flex;
        }

        .btn-submit {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            height: 50px;
            transition: opacity 0.2s;
        }

        .btn-submit:hover { opacity: 0.9; }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .history-row {
            background: var(--card-inner-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 22px 28px;
            display: grid;
            grid-template-columns: 0.8fr 1.5fr 1.5fr auto;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .history-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: rgba(255,255,255,0.05);
        }
        .history-row.has-profit::before { background: var(--accent-green); }
        .history-row.has-loss::before { background: #ef4444; }

        .cell-date {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .cell-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .cell-value {
            font-size: 17px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .cell-value.green { color: var(--accent-green); }
        .cell-value.red { color: #ef4444; }
        
        .sub-sold {
            font-size: 12px;
            color: var(--accent-orange);
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }

        .btn-delete {
            background: none;
            border: none;
            color: rgba(239, 68, 68, 0.4);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
        }

        .stat-card {
            background: var(--card-inner-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.75px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .stat-card.total-earned .value { color: var(--accent-green); }
        .stat-card.total-sold .value { color: var(--accent-orange); }
        .stat-card.avg-earned .value { color: var(--accent-purple); }

        .backup-zone {
            margin-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 24px;
        }

        .backup-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.75px;
            margin-bottom: 14px;
        }

        .backup-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-backup {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-backup:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        #fileInput {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .stats-panel { position: static; }
        }

        @media (max-width: 768px) {
            .inputs-inline { grid-template-columns: 1fr; }
            .history-row { grid-template-columns: 1fr; gap: 12px; padding: 20px; }
            .btn-submit { width: 100%; }
        }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <div class="main-panel">
        <div class="header">
            <h1>Мониторинг Фарма Сталкрафта</h1>
        </div>

        <!-- БЕЗОПАСНАЯ ВВОДНАЯ ПЛАШКА ДЛЯ ТОКЕНА -->
        <div class="token-panel" id="tokenPanel">
            <div class="token-header" id="tokenToggle">
                <div class="token-title">Настройки интеграции с GitHub</div>
                <div class="token-arrow">▼</div>
            </div>
            <div class="token-body">
                <div class="form-group">
                    <label for="apiToken">GitHub Personal Access Token</label>
                    <input type="password" id="apiToken" placeholder="Вставь сюда свой ghp_... токен">
                </div>
            </div>
        </div>

        <div class="input-block">
            <div class="inputs-inline">
                <div class="form-group">
                    <label for="logDate">Дата занесения</label>
                    <input type="date" id="logDate">
                </div>
                
                <div class="form-group">
                    <label for="currentBalance">Нынешний баланс на счету</label>
                    <input type="number" id="currentBalance" placeholder="Введите">
                </div>
                
                <button class="btn-submit" id="addDayBtn">Добавить день</button>
            </div>

            <div class="sold-toggle-zone">
                <button class="btn-trigger-sold" id="toggleSoldBtn">+ ПРОДАНО СЕГОДНЯ</button>
                <div class="sold-input-wrapper" id="soldWrapper">
                    <div class="form-group">
                        <label for="soldAmount">Сколько слил на FunPay за сегодня</label>
                        <input type="number" id="soldAmount" value="0" placeholder="Например: 2000000">
                    </div>
                </div>
            </div>
        </div>

        <div class="history-list" id="historyContainer">
            <!-- Строки логов -->
        </div>
    </div>

    <div class="stats-panel">
        <div class="stats-header">
            <h2>Аналитика аккаунта</h2>
        </div>

        <div class="stat-card total-earned">
            <div class="label">Заработано за всё время</div>
            <div class="value" id="statTotalEarned">0</div>
        </div>

        <div class="stat-card total-sold">
            <div class="label">Всего слито (FunPay)</div>
            <div class="value" id="statTotalSold">0</div>
        </div>

        <div class="stat-card avg-earned">
            <div class="label">Медиана дохода (в день)</div>
            <div class="value" id="statAvgEarned">0</div>
        </div>

        <div class="backup-zone">
            <div class="backup-title">Резервное копирование</div>
            <div class="backup-buttons">
                <button class="btn-backup" id="exportBtn">Экспорт лога</button>
                <button class="btn-backup" id="importBtn">Импорт лога</button>
                <input type="file" id="fileInput" accept=".json">
            </div>
        </div>
    </div>
</div>

<script>
    const logDateInput = document.getElementById('logDate');
    const currentBalanceInput = document.getElementById('currentBalance');
    const soldAmountInput = document.getElementById('soldAmount');
    const addDayBtn = document.getElementById('addDayBtn');
    const toggleSoldBtn = document.getElementById('toggleSoldBtn');
    const soldWrapper = document.getElementById('soldWrapper');
    const historyContainer = document.getElementById('historyContainer');

    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const fileInput = document.getElementById('fileInput');

    const statTotalEarned = document.getElementById('statTotalEarned');
    const statTotalSold = document.getElementById('statTotalSold');
    const statAvgEarned = document.getElementById('statAvgEarned');

    const tokenPanel = document.getElementById('tokenPanel');
    const tokenToggle = document.getElementById('tokenToggle');
    const apiTokenInput = document.getElementById('apiToken');

    // Константы путей
    const GITHUB_USER = 'onlynoneo';
    const GITHUB_REPO = 'stalcraft-tracker'; 
    const FILE_PATH = 'farm_data.json'; 

    let farmLog = JSON.parse(localStorage.getItem('stalcraftFarmLog')) || [];

    // Управление плашкой токена
    tokenToggle.addEventListener('click', () => {
        tokenPanel.classList.toggle('active');
    });

    // Извлечение и автосохранение токена локально в браузере
    apiTokenInput.value = localStorage.getItem('stalcraftApiToken') || '';
    apiTokenInput.addEventListener('input', (e) => {
        localStorage.setItem('stalcraftApiToken', e.target.value.trim());
    });

    function formatNumberWithSpaces(num) {
        return Math.round(num).toLocaleString('ru-RU');
    }

    function setDefaultDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        logDateInput.value = `${yyyy}-${mm}-${dd}`;
    }

    toggleSoldBtn.addEventListener('click', () => {
        soldWrapper.classList.toggle('active');
        if(!soldWrapper.classList.contains('active')) {
            soldAmountInput.value = '0';
        }
    });

    async function uploadToGitHub(data) {
        const token = localStorage.getItem('stalcraftApiToken');
        if (!token) {
            console.log('Токен не задан в интерфейсе. Изменения сохранены только локально.');
            return;
        }

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        
        try {
            let sha = '';
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if (getRes.status === 200) {
                const fileData = await getRes.json();
                sha = fileData.sha;
            }

            const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Update farm log: ${new Date().toLocaleDateString()}`,
                    content: contentBase64,
                    sha: sha || undefined
                })
            });

            if (putRes.ok) {
                console.log('Синхронизация с GitHub выполнена успешно.');
            } else {
                const errData = await putRes.json();
                console.error('Ошибка API GitHub:', errData.message);
            }
        } catch (error) {
            console.error('Ошибка сети при отправке на GitHub:', error);
        }
    }

    addDayBtn.addEventListener('click', async () => {
        const todayBalance = parseFloat(currentBalanceInput.value);
        const todaySold = parseFloat(soldAmountInput.value) || 0;
        const selectedDateRaw = logDateInput.value;

        if (!selectedDateRaw) {
            alert('Выбери дату');
            return;
        }
        if (isNaN(todayBalance) || todayBalance < 0) {
            alert('Введи актуальный баланс счета');
            return;
        }

        const [yyyy, mm, dd] = selectedDateRaw.split('-');
        const formattedDate = `${dd}.${mm}`;

        const existingIndex = farmLog.findIndex(item => item.date === formattedDate);
        if (existingIndex !== -1) {
            if(confirm(`Запись за ${formattedDate} уже существует. Перезаписать ее?`)) {
                farmLog.splice(existingIndex, 1);
            } else {
                return;
            }
        }

        farmLog.push({
            date: formattedDate,
            rawDate: selectedDateRaw,
            balance: todayBalance,
            sold: todaySold,
            earned: 0
        });

        farmLog.sort((a, b) => new Date(b.rawDate) - new Date(a.rawDate));
        recalculateEarnedValues();

        localStorage.setItem('stalcraftFarmLog', JSON.stringify(farmLog));

        currentBalanceInput.value = '';
        soldAmountInput.value = '0';
        soldWrapper.classList.remove('active');
        setDefaultDate();

        renderAll();
        await uploadToGitHub(farmLog);
    });

    function recalculateEarnedValues() {
        for (let i = farmLog.length - 1; i >= 0; i--) {
            if (i === farmLog.length - 1) {
                farmLog[i].earned = 0;
            } else {
                const prevDay = farmLog[i + 1];
                farmLog[i].earned = (farmLog[i].balance - prevDay.balance) + farmLog[i].sold;
            }
        }
    }

    function calculateMedian(arr) {
        if (arr.length === 0) return 0;
        const sorted = [...arr].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function updateAnalytics() {
        if (farmLog.length < 2) {
            statTotalEarned.textContent = '0';
            statTotalSold.textContent = '0';
            statAvgEarned.textContent = '0';
            return;
        }

        let totalEarned = 0;
        let totalSold = 0;
        let activeDays = [];

        for (let i = 0; i < farmLog.length - 1; i++) {
            totalEarned += farmLog[i].earned;
            totalSold += farmLog[i].sold;
            activeDays.push(farmLog[i]);
        }

        const earnedValues = activeDays.map(d => d.earned);
        const medianEarned = calculateMedian(earnedValues);

        statTotalEarned.textContent = formatNumberWithSpaces(totalEarned);
        statTotalSold.textContent = formatNumberWithSpaces(totalSold);
        statAvgEarned.textContent = formatNumberWithSpaces(medianEarned);
    }

    window.deleteRow = async function(index) {
        if(confirm('Удалить эту запись?')) {
            farmLog.splice(index, 1);
            recalculateEarnedValues();
            localStorage.setItem('stalcraftFarmLog', JSON.stringify(farmLog));
            renderAll();
            await uploadToGitHub(farmLog);
        }
    }

    exportBtn.addEventListener('click', () => {
        if (farmLog.length === 0) {
            alert('Лог пуст, экспортировать нечего.');
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(farmLog, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "stalcraft_backup.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    });

    importBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(event) {
            try {
                const parsedData = JSON.parse(event.target.result);
                if (Array.isArray(parsedData)) {
                    if (confirm('Импортируемый файл полностью перезапишет текущую историю в браузере. Продолжить?')) {
                        farmLog = parsedData;
                        localStorage.setItem('stalcraftFarmLog', JSON.stringify(farmLog));
                        renderAll();
                        await uploadToGitHub(farmLog);
                    }
                } else {
                    alert('Ошибка: Файл имеет некорректный формат.');
                }
            } catch (err) {
                alert('Не удалось прочитать файл.');
            }
            fileInput.value = '';
        };
        reader.readAsText(file);
    });

    function renderLog() {
        historyContainer.innerHTML = '';
        if (farmLog.length === 0) {
            historyContainer.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:14px; padding:20px;">Лог чист. Занеси баланс, чтобы начать мониторинг.</div>';
            return;
        }

        farmLog.forEach((item, index) => {
            const row = document.createElement('div');
            let statusClass = '';
            let earnedClass = '';
            let sign = '';

            if (index === farmLog.length - 1) {
                earnedClass = '';
                sign = '';
            } else if (item.earned > 0) {
                statusClass = 'has-profit';
                earnedClass = 'green';
                sign = '+';
            } else if (item.earned < 0) {
                statusClass = 'has-loss';
                earnedClass = 'red';
            }

            row.className = `history-row ${statusClass}`;
            row.innerHTML = `
                <div class="cell-date">${item.date}</div>
                <div>
                    <div class="cell-label">Заработано фармом</div>
                    <div class="cell-value ${earnedClass}">
                        ${index === farmLog.length - 1 ? '— (База)' : sign + formatNumberWithSpaces(item.earned)}
                    </div>
                </div>
                <div>
                    <div class="cell-label">Баланс на счету</div>
                    <div class="cell-value">${formatNumberWithSpaces(item.balance)}</div>
                    ${item.sold > 0 ? `<span class="sub-sold">Продано: ${formatNumberWithSpaces(item.sold)}</span>` : ''}
                </div>
                <div>
                    <button class="btn-delete" onclick="deleteRow(${index})">Удалить</button>
                </div>
            `;
            historyContainer.appendChild(row);
        });
    }

    function renderAll() {
        renderLog();
        updateAnalytics();
    }

    setDefaultDate();
    renderAll();
</script>

</body>
</html>
