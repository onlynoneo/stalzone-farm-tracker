<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalcraft Farm Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%230f111a' stroke='%23818cf8' stroke-width='8'/><path d='M50 10A40 40 0 0 1 90 50A40 40 0 0 0 50 10' fill='%23818cf8'/></svg>">
    <style>
        :root {
            --bg-gradient-start: #0f111a;
            --bg-gradient-end: #07080c;
            --panel-bg: rgba(22, 26, 41, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(10, 12, 20, 0.8);
            --input-border: rgba(255, 255, 255, 0.12);
            --input-focus: #4f46e5;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #34d399;
            --accent-orange: #fb923c;
            --accent-purple: #818cf8;
            --card-inner-bg: rgba(255, 255, 255, 0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 32px;
            width: 100%;
            max-width: 1200px;
            align-items: start;
        }

        .main-panel, .stats-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: sticky;
            top: 40px;
        }

        .header { margin-bottom: 32px; }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .config-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-block {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .inputs-inline {
            display: grid;
            grid-template-columns: 1.2fr 1fr auto;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.75px; }
        
        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
        }
        input:focus { border-color: var(--input-focus); }

        .btn-trigger-sold {
            background: rgba(251, 146, 60, 0.1);
            border: 1px solid rgba(251, 146, 60, 0.2);
            color: var(--accent-orange);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            align-self: flex-start;
        }

        .sold-input-wrapper { display: none; }
        .sold-input-wrapper.active { display: flex; }

        .btn-submit {
            background: #ffffff; color: #000; border: none; padding: 14px 24px;
            border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; height: 50px;
        }

        .history-list { display: flex; flex-direction: column; gap: 14px; }
        .history-row {
            background: var(--card-inner-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 22px 28px;
            display: grid;
            grid-template-columns: 0.8fr 1.5fr 1.5fr auto;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        .history-row.has-profit::before { content: ''; position: absolute; top:0; left:0; width:4px; height:100%; background: var(--accent-green); }
        .history-row.has-loss::before { content: ''; position: absolute; top:0; left:0; width:4px; height:100%; background: #ef4444; }

        .cell-date { font-size: 15px; font-weight: 700; color: var(--text-muted); }
        .cell-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        .cell-value { font-size: 17px; font-weight: 700; }
        .cell-value.green { color: var(--accent-green); }
        .cell-value.red { color: #ef4444; }
        .sub-sold { color: var(--accent-orange); font-size: 12px; display: block; margin-top: 4px; }

        .btn-delete { background: none; border: none; color: rgba(239, 68, 68, 0.4); cursor: pointer; font-weight: 700; }
        .btn-delete:hover { color: #ef4444; }

        .stat-card { background: var(--card-inner-bg); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 16px; padding: 20px; }
        .stat-card .label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-card .value { font-size: 22px; font-weight: 800; }
        .stat-card.total-earned .value { color: var(--accent-green); }
        .stat-card.total-sold .value { color: var(--accent-orange); }
        .stat-card.avg-earned .value { color: var(--accent-purple); }

        .sync-status { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <div class="main-panel">
        <div class="header">
            <h1>Мониторинг Фарма Сталкрафта Cloud</h1>
        </div>

        <!-- Настройка облака -->
        <div class="config-block">
            <div class="form-group">
                <label>GitHub Токен (Классический)</label>
                <input type="password" id="ghToken" placeholder="ghp_...">
            </div>
            <div class="form-group">
                <label>Твой ник на GitHub</label>
                <input type="text" id="ghUser" placeholder="username">
            </div>
            <div class="form-group">
                <label>Имя репозитория</label>
                <input type="text" id="ghRepo" placeholder="stalcraft-tracker" value="stalcraft-tracker">
            </div>
        </div>

        <div class="input-block">
            <div class="inputs-inline">
                <div class="form-group">
                    <label for="logDate">Дата занесения</label>
                    <input type="date" id="logDate">
                </div>
                <div class="form-group">
                    <label for="currentBalance">Нынешний баланс на счету</label>
                    <input type="number" id="currentBalance" placeholder="Введите">
                </div>
                <button class="btn-submit" id="addDayBtn">Добавить день</button>
            </div>
            <div class="sold-toggle-zone">
                <button class="btn-trigger-sold" id="toggleSoldBtn">+ ПРОДАНО СЕГОДНЯ</button>
                <div class="sold-input-wrapper" id="soldWrapper">
                    <div class="form-group">
                        <label for="soldAmount">Сколько слил на FunPay за сегодня</label>
                        <input type="number" id="soldAmount" value="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="history-list" id="historyContainer"></div>
    </div>

    <div class="stats-panel">
        <div class="stats-header"><h2>Аналитика аккаунта</h2></div>
        <div class="stat-card total-earned">
            <div class="label">Заработано за всё время</div>
            <div class="value" id="statTotalEarned">0</div>
        </div>
        <div class="stat-card total-sold">
            <div class="label">Всего слито (FunPay)</div>
            <div class="value" id="statTotalSold">0</div>
        </div>
        <div class="stat-card avg-earned">
            <div class="label">Медиана дохода (в день)</div>
            <div class="value" id="statAvgEarned">0</div>
        </div>
        <div class="sync-status" id="syncStatus">Статус: Загрузка локальных данных...</div>
    </div>
</div>

<script>
    const logDateInput = document.getElementById('logDate');
    const currentBalanceInput = document.getElementById('currentBalance');
    const soldAmountInput = document.getElementById('soldAmount');
    const addDayBtn = document.getElementById('addDayBtn');
    const toggleSoldBtn = document.getElementById('toggleSoldBtn');
    const soldWrapper = document.getElementById('soldWrapper');
    const historyContainer = document.getElementById('historyContainer');
    const statTotalEarned = document.getElementById('statTotalEarned');
    const statTotalSold = document.getElementById('statTotalSold');
    const statAvgEarned = document.getElementById('statAvgEarned');
    const syncStatus = document.getElementById('syncStatus');

    const ghTokenInput = document.getElementById('ghToken');
    const ghUserInput = document.getElementById('ghUser');
    const ghRepoInput = document.getElementById('ghRepo');

    let farmLog = [];
    let fileSha = ""; // Нужно GitHub для перезаписи файла

    // Загрузка настроек из localStorage
    ghTokenInput.value = localStorage.getItem('gh_token') || '';
    ghUserInput.value = localStorage.getItem('gh_user') || '';
    ghRepoInput.value = localStorage.getItem('gh_repo') || 'stalcraft-tracker';

    function saveConfig() {
        localStorage.setItem('gh_token', ghTokenInput.value);
        localStorage.setItem('gh_user', ghUserInput.value);
        localStorage.setItem('gh_repo', ghRepoInput.value);
    }

    ghTokenInput.addEventListener('change', () => { saveConfig(); loadFromGitHub(); });
    ghUserInput.addEventListener('change', () => { saveConfig(); loadFromGitHub(); });
    ghRepoInput.addEventListener('change', () => { saveConfig(); loadFromGitHub(); });

    function formatNumberWithSpaces(num) { return Math.round(num).toLocaleString('ru-RU'); }

    function setDefaultDate() {
        const today = new Date();
        logDateInput.value = today.toISOString().split('T')[0];
    }

    toggleSoldBtn.addEventListener('click', () => {
        soldWrapper.classList.toggle('active');
        if(!soldWrapper.classList.contains('active')) soldAmountInput.value = '0';
    });

    // Функция загрузки базы из GitHub репозитория (файл data.json)
    async function loadFromGitHub() {
        const token = ghTokenInput.value;
        const user = ghUserInput.value;
        const repo = ghRepoInput.value;

        if (!token || !user || !repo) {
            syncStatus.textContent = "Статус: Введи данные GitHub для синхронизации";
            // Временный откат на локальное хранилище
            farmLog = JSON.parse(localStorage.getItem('stalcraftFarmLog')) || [];
            renderAll();
            return;
        }

        syncStatus.textContent = "Статус: Синхронизация с облаком...";
        const url = `https://api.github.com/repos/${user}/${repo}/contents/data.json`;

        try {
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (res.status === 200) {
                const data = await res.json();
                fileSha = data.sha;
                const content = decodeURIComponent(atob(data.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                farmLog = JSON.parse(content);
                syncStatus.textContent = "Статус: Облачные данные загружены";
            } else if (res.status === 404) {
                syncStatus.textContent = "Статус: Облачный файл не найден, будет создан новый";
                farmLog = [];
            }
        } catch (err) {
            syncStatus.textContent = "Статус: Ошибка сети при связи с GitHub";
        }
        renderAll();
    }

    // Функция сохранения лога на GitHub
    async function saveToGitHub() {
        const token = ghTokenInput.value;
        const user = ghUserInput.value;
        const repo = ghRepoInput.value;

        // Дублируем локально на всякий случай
        localStorage.setItem('stalcraftFarmLog', JSON.stringify(farmLog));

        if (!token || !user || !repo) return;

        syncStatus.textContent = "Статус: Сохранение в облако...";
        const url = `https://api.github.com/repos/${user}/${repo}/contents/data.json`;
        
        // Корректный перевод кириллицы в base64
        const jsonStr = JSON.stringify(farmLog, null, 2);
        const b64Content = btoa(encodeURIComponent(jsonStr).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));

        const bodyData = {
            message: "auto-update farm log",
            content: b64Content
        };
        if (fileSha) bodyData.sha = fileSha;

        try {
            const res = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });
            if (res.ok) {
                const resData = await res.json();
                fileSha = resData.content.sha; // Обновляем SHA для следующих коммитов
                syncStatus.textContent = "Статус: Данные успешно сохранены на GitHub!";
            } else {
                syncStatus.textContent = "Статус: Ошибка сохранения на GitHub";
            }
        } catch (err) {
            syncStatus.textContent = "Статус: Ошибка сети при отправке";
        }
    }

    addDayBtn.addEventListener('click', async () => {
        const todayBalance = parseFloat(currentBalanceInput.value);
        const todaySold = parseFloat(soldAmountInput.value) || 0;
        const selectedDateRaw = logDateInput.value;

        if (!selectedDateRaw || isNaN(todayBalance) || todayBalance < 0) {
            alert('Заполни корректно дату и баланс');
            return;
        }

        const [yyyy, mm, dd] = selectedDateRaw.split('-');
        const formattedDate = `${dd}.${mm}`;

        const existingIndex = farmLog.findIndex(item => item.date === formattedDate);
        if (existingIndex !== -1) {
            if(confirm(`Запись за ${formattedDate} уже есть. Перезаписать?`)) {
                farmLog.splice(existingIndex, 1);
            } else { return; }
        }

        farmLog.push({
            date: formattedDate,
            rawDate: selectedDateRaw,
            balance: todayBalance,
            sold: todaySold,
            earned: 0
        });

        farmLog.sort((a, b) => new Date(b.rawDate) - new Date(a.rawDate));
        recalculateEarnedValues();

        currentBalanceInput.value = '';
        soldAmountInput.value = '0';
        soldWrapper.classList.remove('active');
        setDefaultDate();

        renderAll();
        await saveToGitHub();
    });

    function recalculateEarnedValues() {
        for (let i = farmLog.length - 1; i >= 0; i--) {
            if (i === farmLog.length - 1) {
                farmLog[i].earned = 0;
            } else {
                const prevDay = farmLog[i + 1];
                farmLog[i].earned = (farmLog[i].balance - prevDay.balance) + farmLog[i].sold;
            }
        }
    }

    function calculateMedian(arr) {
        if (arr.length === 0) return 0;
        const sorted = [...arr].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function updateAnalytics() {
        if (farmLog.length < 2) {
            statTotalEarned.textContent = '0'; statTotalSold.textContent = '0'; statAvgEarned.textContent = '0';
            return;
        }
        let totalEarned = 0; let totalSold = 0; let activeDays = [];
        for (let i = 0; i < farmLog.length - 1; i++) {
            totalEarned += farmLog[i].earned;
            totalSold += farmLog[i].sold;
            activeDays.push(farmLog[i]);
        }
        const earnedValues = activeDays.map(d => d.earned);
        statTotalEarned.textContent = formatNumberWithSpaces(totalEarned);
        statTotalSold.textContent = formatNumberWithSpaces(totalSold);
        statAvgEarned.textContent = formatNumberWithSpaces(calculateMedian(earnedValues));
    }

    window.deleteRow = async function(index) {
        if(confirm('Удалить эту запись?')) {
            farmLog.splice(index, 1);
            recalculateEarnedValues();
            renderAll();
            await saveToGitHub();
        }
    }

    function renderLog() {
        historyContainer.innerHTML = '';
        if (farmLog.length === 0) {
            historyContainer.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:14px; padding:20px;">Лог пуст. Занеси первый баланс.</div>';
            return;
        }

        farmLog.forEach((item, index) => {
            const row = document.createElement('div');
            let statusClass = ''; let earnedClass = ''; let sign = '';

            if (index === farmLog.length - 1) { earnedClass = ''; sign = ''; }
            else if (item.earned > 0) { statusClass = 'has-profit'; earnedClass = 'green'; sign = '+'; }
            else if (item.earned < 0) { statusClass = 'has-loss'; earnedClass = 'red'; }

            row.className = `history-row ${statusClass}`;
            row.innerHTML = `
                <div class="cell-date">${item.date}</div>
                <div>
                    <div class="cell-label">Заработано фармом</div>
                    <div class="cell-value ${earnedClass}">
                        ${index === farmLog.length - 1 ? '— (База)' : sign + formatNumberWithSpaces(item.earned)}
                    </div>
                </div>
                <div>
                    <div class="cell-label">Баланс на счету</div>
                    <div class="cell-value">${formatNumberWithSpaces(item.balance)}</div>
                    ${item.sold > 0 ? `<span class="sub-sold">Продано: ${formatNumberWithSpaces(item.sold)}</span>` : ''}
                </div>
                <div><button class="btn-delete" onclick="deleteRow(${index})">Удалить</button></div>
            `;
            historyContainer.appendChild(row);
        });
    }

    function renderAll() { renderLog(); updateAnalytics(); }
    setDefaultDate();
    loadFromGitHub();
</script>
</body>
</html>
