<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalcraft Income Tracker & Cloud</title>
    <style>
        :root {
            --bg-dark: #0b0c10;
            --bg-card: rgba(31, 40, 51, 0.4);
            --bg-card-hover: rgba(31, 40, 51, 0.6);
            --border-glow: #45f3ff;
            --border-dim: rgba(69, 243, 255, 0.2);
            --text-main: #c5c6c7;
            --text-bright: #fff;
            --accent-green: #00ffcc;
            --accent-red: #ff3366;
            --neon-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1f2833 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        header h1 {
            color: var(--text-bright);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--neon-shadow);
            margin-bottom: 10px;
        }

        header p {
            color: var(--border-glow);
            font-size: 1rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Общие стили блоков */
        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-dim);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .glass-panel:hover::before {
            left: 100%;
        }

        .glass-panel:hover {
            border-color: var(--border-glow);
            box-shadow: var(--neon-shadow);
            transform: translateY(-5px);
            background: var(--bg-card-hover);
        }

        /* Компактная панель облака */
        .cloud-panel {
            padding: 15px 25px;
            margin-bottom: 25px;
            border-radius: 12px;
        }

        .cloud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .cloud-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
            box-shadow: 0 0 8px var(--accent-red);
            transition: all 0.3s;
        }

        .status-dot.active {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        .cloud-toggle-btn {
            font-size: 0.8rem;
            color: var(--border-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border-dim);
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .cloud-header:hover .cloud-toggle-btn {
            background: rgba(69, 243, 255, 0.1);
            border-color: var(--border-glow);
        }

        .cloud-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .cloud-content.open {
            max-height: 150px;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .sync-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            align-items: end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-bright);
        }

        .input-field {
            background: rgba(11, 12, 16, 0.7);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-bright);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--border-glow);
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.2);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--border-glow);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 0 5px rgba(69, 243, 255, 0.1);
        }

        .btn:hover {
            background: var(--border-glow);
            color: var(--bg-dark);
            box-shadow: var(--neon-shadow);
        }

        .btn:disabled {
            border-color: var(--border-dim);
            color: var(--border-dim);
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-primary {
            background: var(--border-glow);
            color: var(--bg-dark);
            box-shadow: var(--neon-shadow);
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--border-glow);
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-dim);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            animation: cardSpawn 0.5s ease-out both;
        }

        @keyframes cardSpawn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        .stat-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--neon-shadow);
            transform: translateY(-5px);
            background: var(--bg-card-hover);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-bright);
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .stat-card.highlight .stat-value {
            color: var(--border-glow);
            text-shadow: var(--neon-shadow);
        }

        /* Основной контент */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        /* Форма добавления */
        .entry-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            color: var(--text-main);
            font-size: 0.95rem;
            padding: 5px 0;
        }

        .checkbox-container input {
            display: none;
        }

        .checkmark {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            display: inline-block;
            position: relative;
            background: rgba(11, 12, 16, 0.7);
            transition: all 0.2s;
        }

        .checkbox-container:hover .checkmark {
            border-color: var(--border-glow);
        }

        .checkbox-container input:checked + .checkmark {
            background: var(--border-glow);
            border-color: var(--border-glow);
            box-shadow: 0 0 8px rgba(69, 243, 255, 0.5);
        }

        .checkbox-container input:checked + .checkmark::after {
            content: "✓";
            position: absolute;
            color: var(--bg-dark);
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Список логов */
        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 15px;
        }

        .logs-header h2 {
            color: var(--text-bright);
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .logs-container {
            max-height: 480px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .logs-container::-webkit-scrollbar {
            width: 6px;
        }

        .logs-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background: var(--border-dim);
            border-radius: 4px;
        }

        .logs-container::-webkit-scrollbar-thumb:hover {
            background: var(--border-glow);
        }

        .log-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 15px;
            background: rgba(11, 12, 16, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.3s;
            animation: logSpawn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes logSpawn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-item:hover {
            border-color: var(--border-dim);
            background: rgba(11, 12, 16, 0.6);
            transform: scale(1.01);
        }

        .log-day {
            background: var(--border-dim);
            color: var(--border-glow);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 65px;
            text-align: center;
        }

        .log-comment {
            color: var(--text-main);
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-amount {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .log-amount.plus { color: var(--accent-green); }
        .log-amount.minus { color: var(--accent-red); }

        .btn-delete {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            transition: color 0.2s;
        }

        .btn-delete:hover {
            color: var(--accent-red);
        }

        .empty-state {
            text-align: center;
            color: rgba(197, 198, 199, 0.4);
            padding: 40px 0;
            font-style: italic;
        }

        /* Статус синхронизации */
        .status-banner {
            font-size: 0.85rem;
            padding: 8px 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .status-banner.success {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            display: block;
        }

        .status-banner.error {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            display: block;
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .sync-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Stalcraft Income Tracker</h1>
        <p>Управление финансами с облачной синхронизацией GitHub</p>
    </header>

    <!-- Компактный скрываемый блок облака -->
    <div class="glass-panel cloud-panel">
        <div class="cloud-header" onclick="toggleCloudPanel()">
            <div class="cloud-status">
                <div id="statusDot" class="status-dot"></div>
                <span id="statusText">Облако: отключено</span>
            </div>
            <div id="toggleBtnLabel" class="cloud-toggle-btn">Настройки</div>
        </div>
        
        <div id="cloudContent" class="cloud-content">
            <div class="sync-grid">
                <div class="input-group">
                    <label for="ghToken">GitHub Personal Access Token</label>
                    <input type="password" id="ghToken" class="input-field" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
                </div>
                <button id="btnConnect" class="btn btn-primary" onclick="initGitHubCloud()">Подключить</button>
                <button id="btnSync" class="btn" onclick="syncDataToCloud()" disabled>Сохранить вручную</button>
            </div>
        </div>
        <div id="statusBanner" class="status-banner"></div>
    </div>

    <!-- Виджеты статистики -->
    <div class="stats-grid">
        <div class="stat-card highlight">
            <h3>Чистый Баланс</h3>
            <div id="statTotal" class="stat-value">0 руб.</div>
        </div>
        <div class="stat-card">
            <h3>Дней отслежено</h3>
            <div id="statDaysCount" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <h3>Среднее (Медиана)</h3>
            <div id="statMedian" class="stat-value">0 руб.</div>
        </div>
        <div class="stat-card">
            <h3>Всего Выведено</h3>
            <div id="statFunpayTotal" class="stat-value">0 руб.</div>
        </div>
    </div>

    <!-- Сетка формы и логов -->
    <div class="main-grid">
        <!-- Форма -->
        <div class="glass-panel">
            <div class="entry-form">
                <div class="input-group">
                    <label for="amount">Сумма (руб.)</label>
                    <input type="number" id="amount" class="input-field" placeholder="Например: 50000 или -15000">
                </div>
                <div class="input-group">
                    <label for="comment">Комментарий / Источник</label>
                    <input type="text" id="comment" class="input-field" placeholder="Фарм кабанчиков, вынос артов">
                </div>
                <label class="checkbox-container">
                    <input type="checkbox" id="isFunPay">
                    <span class="checkmark"></span>
                    Это вывод на FunPay (комиссия -14%)
                </label>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="addEntry()">Зафиксировать день</button>
            </div>
        </div>

        <!-- Таблица логов -->
        <div class="glass-panel">
            <div class="logs-header">
                <h2>История доходов и выводов</h2>
                <button class="btn" style="padding: 6px 14px; font-size: 0.8rem;" onclick="clearAllData()">Очистить всё</button>
            </div>
            <div id="logsContainer" class="logs-container">
                <!-- Логи рендерятся тут скриптом -->
            </div>
        </div>
    </div>
</div>

<script>
    // Инициализация структуры данных
    let trackerState = {
        currentDay: 1,
        logs: []
    };

    // Данные для GitHub интеграции
    const REPO_NAME = "stalcraft-tracker";
    const FILE_PATH = "data.json";
    let GITHUB_TOKEN = "";
    let fileSha = null;

    // Загрузка локальных данных при старте
    window.onload = function() {
        const localData = localStorage.getItem('stalcraft_tracker_data');
        const savedToken = localStorage.getItem('stalcraft_gh_token');
        
        if (localData) {
            trackerState = JSON.parse(localData);
        }
        if (savedToken) {
            document.getElementById('ghToken').value = savedToken;
            // Если токен уже сохранен, пробуем автоматически тихо подключиться
            initGitHubCloud(true); 
        }
        
        updateUI();
    };

    // Функция открытия/закрытия панели настроек облака
    function toggleCloudPanel() {
        const content = document.getElementById('cloudContent');
        const label = document.getElementById('toggleBtnLabel');
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            label.innerText = "Настройки";
        } else {
            content.classList.add('open');
            label.innerText = "Свернуть";
        }
    }

    // Функция ручного добавления новой записи
    function addEntry() {
        const amountInput = document.getElementById('amount');
        const commentInput = document.getElementById('comment');
        const isFunPayCheck = document.getElementById('isFunPay');

        let rawAmount = parseFloat(amountInput.value);
        let comment = commentInput.value.trim() || "Без комментария";

        if (isNaN(rawAmount)) {
            showStatus("Введите корректную сумму", "error");
            return;
        }

        if (isFunPayCheck.checked && rawAmount > 0) {
            rawAmount = Math.round(rawAmount * 0.86);
            comment += " (FunPay -14%)";
        }

        const newLog = {
            day: trackerState.currentDay,
            amount: rawAmount,
            comment: comment,
            isFunPay: isFunPayCheck.checked,
            timestamp: new Date().toISOString()
        };

        trackerState.logs.unshift(newLog);
        trackerState.currentDay++;

        amountInput.value = "";
        commentInput.value = "";
        isFunPayCheck.checked = false;

        saveToLocalStorage();
        updateUI();
        
        if (GITHUB_TOKEN) {
            syncDataToCloud();
        }
    }

    function deleteLog(dayToDelete) {
        trackerState.logs = trackerState.logs.filter(item => item.day !== dayToDelete);
        saveToLocalStorage();
        updateUI();
        
        if (GITHUB_TOKEN) {
            syncDataToCloud();
        }
    }

    function clearAllData() {
        if (confirm("Вы уверены, что хотите полностью стереть всю историю?")) {
            trackerState = { currentDay: 1, logs: [] };
            saveToLocalStorage();
            updateUI();
            if (GITHUB_TOKEN) {
                syncDataToCloud();
            }
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('stalcraft_tracker_data', JSON.stringify(trackerState));
    }

    function calculateMedian(arr) {
        if (arr.length === 0) return 0;
        const sorted = [...arr].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        return sorted.length % 2 !== 0 ? sorted[mid] : Math.round((sorted[mid - 1] + sorted[mid]) / 2);
    }

    function updateUI() {
        let totalBalance = 0;
        let totalFunPay = 0;
        let incomeListForMedian = [];

        const container = document.getElementById('logsContainer');
        container.innerHTML = "";

        if (trackerState.logs.length === 0) {
            container.innerHTML = '<div class="empty-state">Журнал пуст. Введите данные за первый день фарма.</div>';
        } else {
            trackerState.logs.forEach(log => {
                totalBalance += log.amount;
                
                if (log.isFunPay) {
                    totalFunPay += log.amount;
                } else if (log.amount > 0) {
                    incomeListForMedian.push(log.amount);
                }

                const itemHtml = `
                    <div class="log-item">
                        <div class="log-day">День ${log.day}</div>
                        <div class="log-comment">${log.comment}</div>
                        <div class="log-amount ${log.amount >= 0 ? 'plus' : 'minus'}">
                            ${log.amount >= 0 ? '+' : ''}${log.amount.toLocaleString()} руб.
                        </div>
                        <button class="btn-delete" onclick="deleteLog(${log.day})">×</button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        document.getElementById('statTotal').innerText = `${totalBalance.toLocaleString()} руб.`;
        document.getElementById('statDaysCount').innerText = trackerState.logs.length;
        document.getElementById('statFunpayTotal').innerText = `${totalFunPay.toLocaleString()} руб.`;
        document.getElementById('statMedian').innerText = `${calculateMedian(incomeListForMedian).toLocaleString()} руб.`;
    }

    function showStatus(text, type) {
        const banner = document.getElementById('statusBanner');
        banner.innerText = text;
        banner.className = `status-banner ${type}`;
        setTimeout(() => { banner.className = 'status-banner'; }, 5000);
    }

    // Инициализация соединения с GitHub API (isAuto указывает на скрытый фоновый режим при старте)
    async function initGitHubCloud(isAuto = false) {
        const tokenInput = document.getElementById('ghToken').value.trim();
        if (!tokenInput) {
            if(!isAuto) showStatus("Пожалуйста, введите токен доступа GitHub", "error");
            return;
        }

        GITHUB_TOKEN = tokenInput;
        localStorage.setItem('stalcraft_gh_token', GITHUB_TOKEN);
        
        if(!isAuto) showStatus("Проверяем соединение с репозиторием...", "success");

        try {
            const userResponse = await fetch('https://api.github.com/user', {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            
            if (!userResponse.ok) throw new Error("Неверный токен или нет прав доступа");
            const userData = await userResponse.json();
            const username = userData.login;

            const fileUrl = `https://api.github.com/repos/${username}/${REPO_NAME}/contents/${FILE_PATH}`;
            const fileResponse = await fetch(fileUrl, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });

            if (fileResponse.ok) {
                const fileData = await fileResponse.json();
                fileSha = fileData.sha;
                const decodedContent = decodeURIComponent(atob(fileData.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                const cloudState = JSON.parse(decodedContent);
                
                if (cloudState.logs && cloudState.logs.length >= trackerState.logs.length) {
                    trackerState = cloudState;
                    saveToLocalStorage();
                    updateUI();
                    if(!isAuto) showStatus("Данные из Облака успешно импортированы!", "success");
                } else {
                    if(!isAuto) showStatus("Локальные данные новее облачных. Готово к синхронизации.", "success");
                }
            } else if (fileResponse.status === 404) {
                if(!isAuto) showStatus("Файл данных не найден в репозитории. Будет создан новый при синхронизации.", "success");
            }

            // Обновляем визуал статуса на подключенный
            document.getElementById('statusDot').classList.add('active');
            document.getElementById('statusText').innerText = `Облако: подключено (${username})`;
            document.getElementById('btnSync').disabled = false;
            document.getElementById('btnConnect').innerText = "Обновить";

            // Если пользователь нажимал кнопку вручную, автоматически сворачиваем панель после успеха
            if(!isAuto) {
                setTimeout(() => { toggleCloudPanel(); }, 1000);
            }

        } catch (err) {
            if(!isAuto) showStatus(err.message, "error");
            document.getElementById('btnSync').disabled = true;
            document.getElementById('statusDot').classList.remove('active');
            document.getElementById('statusText').innerText = "Облако: ошибка подключения";
        }
    }

    async function syncDataToCloud() {
        if (!GITHUB_TOKEN) return;

        try {
            const userResponse = await fetch('https://api.github.com/user', {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const userData = await userResponse.json();
            const username = userData.login;

            const fileUrl = `https://api.github.com/repos/${username}/${REPO_NAME}/contents/${FILE_PATH}`;
            
            const checkResponse = await fetch(fileUrl, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (checkResponse.ok) {
                const checkData = await checkResponse.json();
                fileSha = checkData.sha;
            }

            const jsonString = JSON.stringify(trackerState, null, 2);
            const base64Content = btoa(encodeURIComponent(jsonString).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));

            const bodyData = {
                message: `Update income tracker data: Day ${trackerState.currentDay - 1}`,
                content: base64Content
            };

            if (fileSha) {
                bodyData.sha = fileSha;
            }

            const putResponse = await fetch(fileUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });

            if (putResponse.ok) {
                const putResult = await putResponse.json();
                fileSha = putResult.content.sha;
                showStatus("Облако синхронизировано успешно!", "success");
            } else {
                throw new Error("Ошибка при сохранении файла на GitHub");
            }

        } catch (err) {
            showStatus(err.message, "error");
        }
    }
</script>
